<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FightDB</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg:         #f5f5f3;
    --surface:    #ffffff;
    --border:     #e4e4e0;
    --text:       #1a1a18;
    --muted:      #6b6b67;
    --success:    #15803d;
    --success-bg: #dcfce7;
    --danger:     #b91c1c;
    --danger-bg:  #fee2e2;
    --warn:       #92400e;
    --warn-bg:    #fef3c7;
    --info:       #1d4ed8;
    --info-bg:    #dbeafe;
    --radius:     10px;
    --shadow:     0 1px 3px rgba(0,0,0,.08);
  }
 
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg);
         color: var(--text); font-size: 15px; line-height: 1.5; }
 
  /* ── layout ── */
  .shell { display: flex; min-height: 100vh; }
 
  .sidebar {
    width: 224px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); padding: 1.5rem 1rem;
    display: flex; flex-direction: column; gap: .2rem;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo { font-size: 18px; font-weight: 600; padding: .5rem .75rem 1.25rem; letter-spacing: -.3px; }
  .sidebar-logo span { color: var(--muted); font-weight: 400; }
 
  .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
                 color: var(--muted); padding: .9rem .75rem .3rem; }
 
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: .55rem .75rem;
    border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--muted);
    border: none; background: none; width: 100%; text-align: left;
    transition: background .12s, color .12s;
  }
  .nav-item:hover  { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--text); color: #fff; }
  .nav-item .icon  { width: 16px; text-align: center; font-style: normal; flex-shrink: 0; }
 
  .role-section { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
  .role-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
                color: var(--muted); margin-bottom: .5rem; display: block; }
  .role-toggle { display: flex; gap: 4px; flex-wrap: wrap; }
  .role-btn {
    flex: 1; min-width: 56px; padding: 5px 6px; border: 1px solid var(--border);
    border-radius: 8px; background: none; cursor: pointer; font-size: 12px;
    color: var(--muted); transition: background .12s, color .12s; white-space: nowrap;
  }
  .role-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
 
  .main { flex: 1; padding: 2rem; max-width: 880px; }
  .page { display: none; }
  .page.active { display: block; }
 
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.5rem; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: .75rem; }
 
  /* ── cards ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }
 
  /* ── stat grid ── */
  .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
          padding: 1rem; text-align: center; box-shadow: var(--shadow); }
  .stat-val { font-size: 26px; font-weight: 600; }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
 
  /* ── fighter rows ── */
  .fighter-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s;
  }
  .fighter-row:last-child { border-bottom: none; }
  .fighter-row:hover { background: var(--bg); margin: 0 -1.25rem;
                       padding: 10px 1.25rem; border-radius: 6px; border-bottom-color: transparent; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: #e8e8e4;
             display: flex; align-items: center; justify-content: center;
             font-size: 13px; font-weight: 600; color: var(--muted); flex-shrink: 0; }
  .fighter-name { font-weight: 500; font-size: 14px; }
  .fighter-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .fighter-info { flex: 1; min-width: 0; }
  .record-badge { font-size: 13px; font-weight: 600; color: var(--muted); }
 
  /* ── event cards ── */
  .event-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.25rem; margin-bottom: 10px; cursor: pointer; box-shadow: var(--shadow);
    transition: border-color .15s, box-shadow .15s;
  }
  .event-card:hover { border-color: #c0c0bc; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .event-card-header { display: flex; align-items: flex-start; gap: 14px; }
  .event-date-block {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; text-align: center; flex-shrink: 0; min-width: 52px;
  }
  .event-day   { font-size: 22px; font-weight: 700; line-height: 1; }
  .event-month { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-top: 2px; }
  .event-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .event-meta  { font-size: 13px; color: var(--muted); }
  .event-sports { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
  .event-status {
    font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap;
  }
  .status-upcoming { background: var(--info-bg);    color: var(--info); }
  .status-past     { background: #f3f4f6;            color: #6b7280; }
  .status-today    { background: var(--success-bg);  color: var(--success); }
 
  /* ── event detail ── */
  .event-detail-banner {
    background: var(--text); color: #fff; border-radius: var(--radius);
    padding: 1.5rem; margin-bottom: 1rem;
  }
  .event-detail-banner h2 { color: #fff; margin-bottom: .25rem; font-size: 20px; }
  .event-detail-meta { font-size: 14px; opacity: .7; }
  .venue-block { display: flex; gap: 10px; align-items: flex-start; }
  .venue-icon  { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .venue-name  { font-weight: 600; font-size: 15px; }
  .venue-addr  { font-size: 13px; color: var(--muted); margin-top: 2px; }
 
  /* ── badges ── */
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; white-space: nowrap; }
  .badge-kb  { background: #ede9fe; color: #5b21b6; }
  .badge-mma { background: #fee2e2; color: #991b1b; }
  .badge-box { background: #d1fae5; color: #065f46; }
 
  /* ── forms ── */
  .form-group { margin-bottom: .875rem; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }
  input, select, textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; background: var(--surface);
    color: var(--text); outline: none; transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--text); }
  textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
  .checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
  .checkbox-group input[type=checkbox] { width: auto; }
 
  /* ── buttons ── */
  .btn { padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px;
         background: none; cursor: pointer; font-size: 14px; color: var(--text);
         transition: background .12s; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-primary:hover { opacity: .88; background: var(--text); }
  .btn-danger  { background: var(--danger-bg); color: var(--danger); border-color: #fca5a5; }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
 
  /* ── toolbar / chips ── */
  .toolbar { display: flex; gap: 10px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap input { padding-left: 32px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
                 width: 14px; height: 14px; opacity: .45; pointer-events: none; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px;
          font-size: 12px; cursor: pointer; color: var(--muted); background: none;
          transition: background .1s, color .1s; }
  .chip.active { background: var(--text); color: #fff; border-color: var(--text); }
 
  /* ── match cards ── */
  .match-card { display: flex; align-items: center; gap: 14px; padding: 12px 1.25rem;
                border-bottom: 1px solid var(--border); }
  .match-card:last-child { border-bottom: none; }
  .match-info { flex: 1; }
  .match-names { font-weight: 500; font-size: 14px; }
  .match-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .match-score-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px;
                      font-weight: 600; white-space: nowrap; }
  .score-high { background: var(--success-bg); color: var(--success); }
  .score-mid  { background: var(--warn-bg);    color: var(--warn); }
  .score-low  { background: #f3f4f6;           color: #6b7280; }
 
  /* ── history rows ── */
  .history-row { display: flex; align-items: center; gap: 12px; padding: 9px 0;
                 border-bottom: 1px solid var(--border); font-size: 13px; }
  .history-row:last-child { border-bottom: none; }
  .result-w { color: var(--success); font-weight: 700; width: 18px; }
  .result-l { color: var(--danger);  font-weight: 700; width: 18px; }
  .result-d { color: var(--muted);   font-weight: 700; width: 18px; }
 
  /* ── detail panels ── */
  .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 1.25rem; }
  .detail-avatar { width: 56px; height: 56px; border-radius: 50%; background: #e8e8e4;
                   display: flex; align-items: center; justify-content: center;
                   font-size: 18px; font-weight: 600; color: var(--muted); }
  .detail-grid   { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1rem; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
              color: var(--muted); cursor: pointer; margin-bottom: 1rem;
              border: none; background: none; padding: 0; }
  .back-btn:hover { color: var(--text); }
 
  /* ── divider ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
 
  /* ── toast ── */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text);
           color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 14px;
           opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 999; }
  .toast.show { opacity: 1; }
 
  .empty { text-align: center; color: var(--muted); padding: 3rem 0; font-size: 14px; }
 
  /* ── sidebar nav visibility by role ── */
  /* Hide all role-gated nav items by default */
  .sidebar .fighter-only,
  .sidebar .coach-only,
  .sidebar .promoter-only,
  .sidebar .mgmt-only { display: none; }
 
  /* Fighter */
  body.role-fighter .sidebar .fighter-only { display: flex; }
 
  /* Coach */
  body.role-coach .sidebar .coach-only  { display: flex; }
  body.role-coach .sidebar .mgmt-only   { display: flex; }
 
  /* Promoter */
  body.role-promoter .sidebar .promoter-only { display: flex; }
  body.role-promoter .sidebar .mgmt-only     { display: flex; }
 
  /* nav-section labels (div, not button) use block not flex */
  .sidebar .nav-section.fighter-only,
  .sidebar .nav-section.mgmt-only { display: none; }
  body.role-fighter  .sidebar .nav-section.fighter-only { display: block; }
  body.role-coach    .sidebar .nav-section.mgmt-only    { display: block; }
  body.role-promoter .sidebar .nav-section.mgmt-only    { display: block; }
    @media (max-width: 640px) {
    .sidebar { width: 56px; padding: .75rem .5rem; }
    .sidebar-logo, .nav-item span, .role-section, .nav-section { display: none; }
    .nav-item { justify-content: center; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
 
<div class="shell">
 
  <!-- ── sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">Fight<span>DB</span></div>
 
    <div class="nav-section">General</div>
    <button class="nav-item active" data-page="dashboard"><i class="icon">◈</i><span>Dashboard</span></button>
    <button class="nav-item" data-page="fighters"><i class="icon">◉</i><span>Fighters</span></button>
    <button class="nav-item" data-page="events"><i class="icon">◷</i><span>Events</span></button>
    <button class="nav-item" data-page="history"><i class="icon">≡</i><span>Fight history</span></button>
 
    <div class="nav-section fighter-only">My account</div>
    <button class="nav-item fighter-only" data-page="profile"><i class="icon">◎</i><span>My profile</span></button>
 
    <div class="nav-section mgmt-only">Management</div>
    <button class="nav-item coach-only" data-page="matchmake"><i class="icon">⇄</i><span>Matchmake</span></button>
    <button class="nav-item coach-only" data-page="add-fighter"><i class="icon">+</i><span>Add fighter</span></button>
    <button class="nav-item mgmt-only" data-page="add-event"><i class="icon">◆</i><span>Add event</span></button>
    <button class="nav-item promoter-only" data-page="add-venue"><i class="icon">⌂</i><span>Add venue</span></button>
 
    <div class="role-section">
      <span class="role-label">Signed in as</span>
      <div class="role-toggle">
        <button class="role-btn active" onclick="setRole('fighter')">Fighter</button>
        <button class="role-btn" onclick="setRole('coach')">Coach</button>
        <button class="role-btn" onclick="setRole('promoter')">Promoter</button>
      </div>
    </div>
  </aside>
